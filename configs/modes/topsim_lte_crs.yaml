# =============================================================================
# topsim_lte_crs.yaml — TopSim LTE CRS Debugging Mode
# =============================================================================
# 목적: LTE Cell-specific Reference Signal (CRS) 동작 검증
#       - CRS SFR 설정 → 실제 CRS 출력 타이밍 검증
#       - PDSCH/PDCCH와의 타이밍 정렬 확인
#       - 서브프레임별 CRS symbol 정확성 체크
#
# 사용:
#   python3 verdi_wave_tool.py -f topsim.fsdb -c configs/modes/topsim_lte_crs.yaml
# =============================================================================

# TopSim은 full system TB 경로 사용
top:   "tb.u_top.u_lte_bb"
clock: "tb.sys_clk"
reset: "tb.sys_rst_n"

frame_sync:    "tb.u_top.u_lte_bb.sfn[9:0]"
subframe_sync: "tb.u_top.u_lte_bb.subframe_cnt[3:0]"
slot_sync:     "tb.u_top.u_lte_bb.slot_cnt[0]"
symbol_sync:   "tb.u_top.u_lte_bb.sym_cnt[3:0]"

# ---------------------------------------------------------------------------
# 채널 정의 — CRS 디버깅 관련 신호 집중
# ---------------------------------------------------------------------------
channels:

  # CRS 메인 신호 (최우선 관심)
  CRS:
    color: red
    signals:
      - name: en
        path: crs_en
        radix: bin
      - name: vld
        path: crs_vld
        radix: bin
      - name: seq
        path: crs_seq[127:0]
        radix: hex
        height: 35
      - name: port
        path: crs_ant_port[1:0]
        radix: dec
      - name: bw
        path: crs_bw[2:0]
        radix: dec
      - name: cell_id
        path: crs_cell_id[8:0]
        radix: dec
      - name: v_shift
        path: crs_v_shift[2:0]
        radix: dec
      - name: power
        path: crs_power[7:0]
        radix: dec
      - name: sym_mask
        path: crs_sym_mask[13:0]    # 14 OFDM symbol 중 CRS 위치
        radix: bin
        height: 25

  # PDSCH — CRS 기반 채널 추정 후 복조
  PDSCH:
    color: cyan
    signals:
      - name: en
        path: pdsch_dl_en
        radix: bin
      - name: vld
        path: pdsch_dl_vld
        radix: bin
      - name: data
        path: pdsch_dl_data[127:0]
        radix: hex
        height: 30
      - name: mcs
        path: pdsch_dl_mcs[4:0]
        radix: dec
      - name: rb_num
        path: pdsch_dl_rb_num[6:0]
        radix: dec
      - name: ce_done        # Channel Estimation done (CRS 기반)
        path: pdsch_ce_done
        radix: bin

  # PDCCH — CRS와 같은 서브프레임에서 동작
  PDCCH:
    color: yellow
    signals:
      - name: en
        path: pdcch_dl_en
        radix: bin
      - name: vld
        path: pdcch_dl_vld
        radix: bin
      - name: dci
        path: pdcch_dl_dci[39:0]
        radix: hex
        height: 25
      - name: al
        path: pdcch_dl_al[2:0]
        radix: dec

  # PBCH — MIB 안에 CRS 관련 파라미터 포함
  PBCH:
    color: magenta
    signals:
      - name: en
        path: pbch_dl_en
        radix: bin
      - name: vld
        path: pbch_dl_vld
        radix: bin
      - name: mib
        path: pbch_dl_mib[23:0]
        radix: hex

# ---------------------------------------------------------------------------
# SFR — CRS 설정 레지스터 위주
# ---------------------------------------------------------------------------
sfr:
  base_path: "tb.u_top.u_lte_bb.u_sfr"

  registers:

    CRS_CFG:
      path: "crs_cfg[31:0]"
      fields:
        EN:         "[0]"
        ANT_PORT:   "[2:1]"      # 0=1port, 1=2port, 2=4port
        BW:         "[5:3]"      # 0=1.4MHz ~ 5=20MHz
        V_SHIFT:    "[8:6]"      # cell_id mod 6
        POWER:      "[16:9]"
        CELL_ID:    "[25:17]"    # 0~503

    CRS_SEQ_CFG:
      path: "crs_seq_cfg[31:0]"
      fields:
        CINIT:      "[30:0]"     # Gold sequence initializer
        UPDATE:     "[31]"       # 1=update sequence

    PDSCH_CFG:
      path: "pdsch_cfg[31:0]"
      fields:
        EN:         "[0]"
        MCS:        "[5:1]"
        RB_NUM:     "[11:6]"
        CE_SRC:     "[13:12]"    # 0=CRS, 1=DMRS, 2=bypass

    CHAN_CTRL:
      path: "chan_ctrl[31:0]"
      fields:
        DL_EN:      "[0]"
        CRS_EN:     "[3]"
        SOFT_RST:   "[30]"

    TIMING_CFG:
      path: "timing_cfg[31:0]"
      fields:
        TA:         "[11:0]"
        CRS_OFFSET: "[19:12]"    # CRS symbol offset from subframe boundary

# ---------------------------------------------------------------------------
# 시나리오 파라미터 — LTE CRS 디버깅 최적화
# ---------------------------------------------------------------------------
scenarios:

  sfr_check:
    max_latency_cycles: 8        # CRS는 SFR 변경 후 8사이클 이내 반영 spec
    watch_sfr:
      - CRS_CFG
      - CRS_SEQ_CFG
      - CHAN_CTRL

  timing:
    reference_channel: "CRS"     # CRS를 기준으로 다른 채널 타이밍 측정
    compare_channels:
      - "PDSCH"
      - "PDCCH"
    time_unit: "ns"

  compare:
    mode: "multi-instance"
    instances:
      - "ant0"
      - "ant1"
    signals_to_compare:
      - "crs_seq[127:0]"
      - "crs_vld"
      - "crs_power[7:0]"

  edge_count:
    channels:
      - CRS
      - PDSCH
      - PDCCH
      - PBCH
    signal_key: "vld"
    edge_type:  "rising"

  frame_sync:
    standard:        "LTE"
    lte_frame_ns:    10000000    # 10ms
    nr_subframe_ns:  1000000     # LTE subframe = 1ms
    nr_slot_ns:      500000      # LTE slot = 0.5ms
    num_frames:      8           # TopSim은 보통 80ms+ 시뮬 → 8프레임
