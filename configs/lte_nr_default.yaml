# =============================================================================
# lte_nr_default.yaml — Default LTE/NR signal configuration
# =============================================================================
# Customize this file to match your RTL signal hierarchy.
# Pass to the tool with: -c configs/lte_nr_default.yaml
#
# Signal path convention:
#   Full path = {top}.{path}   e.g., "tb.dut" + "pdsch_dl_en" → "tb.dut.pdsch_dl_en"
#   SFR path  = {sfr.base_path}.{registers.NAME.path}
# =============================================================================

# ---------------------------------------------------------------------------
# Top-level paths (override with --top, --clock on CLI)
# ---------------------------------------------------------------------------
top:   "tb.dut"
clock: "tb.clk"
reset: "tb.rst_n"

# Frame/slot sync signals (relative to top)
frame_sync:    "tb.dut.sfn[9:0]"
subframe_sync: "tb.dut.subframe_idx[3:0]"
slot_sync:     "tb.dut.slot_idx[4:0]"
symbol_sync:   "tb.dut.sym_idx[3:0]"

# ---------------------------------------------------------------------------
# Channel definitions
# Each channel has:
#   color   : nWave group background color
#   signals : list of signals (name, path under top, radix, optional height)
#   instances (optional): list of sub-paths for multi-instance comparison
# ---------------------------------------------------------------------------
channels:

  # ---- Downlink channels ----

  PDSCH:
    color: cyan
    signals:
      - name: en
        path: pdsch_dl_en
        radix: bin
      - name: vld
        path: pdsch_dl_vld
        radix: bin
      - name: data
        path: pdsch_dl_data[127:0]
        radix: hex
        height: 30
      - name: mcs
        path: pdsch_dl_mcs[4:0]
        radix: dec
      - name: rb_start
        path: pdsch_dl_rb_start[6:0]
        radix: dec
      - name: rb_num
        path: pdsch_dl_rb_num[6:0]
        radix: dec
      - name: ack
        path: pdsch_dl_ack
        radix: bin
      - name: ndi
        path: pdsch_dl_ndi
        radix: bin
      - name: rv
        path: pdsch_dl_rv[1:0]
        radix: dec
    # Uncomment to enable multi-instance comparison
    # instances:
    #   - "cc0"
    #   - "cc1"
    #   - "cc2"

  PDCCH:
    color: yellow
    signals:
      - name: en
        path: pdcch_dl_en
        radix: bin
      - name: vld
        path: pdcch_dl_vld
        radix: bin
      - name: dci
        path: pdcch_dl_dci[39:0]
        radix: hex
        height: 25
      - name: rnti
        path: pdcch_dl_rnti[15:0]
        radix: hex
      - name: al
        path: pdcch_dl_al[2:0]
        radix: dec
      - name: format
        path: pdcch_dl_fmt[3:0]
        radix: dec

  PBCH:
    color: magenta
    signals:
      - name: en
        path: pbch_dl_en
        radix: bin
      - name: vld
        path: pbch_dl_vld
        radix: bin
      - name: mib
        path: pbch_dl_mib[23:0]
        radix: hex
      - name: sfn_msb
        path: pbch_dl_sfn_msb[5:0]
        radix: dec

  SSB:
    color: white
    signals:
      - name: en
        path: ssb_en
        radix: bin
      - name: vld
        path: ssb_vld
        radix: bin
      - name: idx
        path: ssb_idx[2:0]
        radix: dec
      - name: beam
        path: ssb_beam_id[5:0]
        radix: dec
      - name: periodicity
        path: ssb_periodicity[2:0]
        radix: dec

  CSI_RS:
    color: pink
    signals:
      - name: en
        path: csi_rs_en
        radix: bin
      - name: vld
        path: csi_rs_vld
        radix: bin
      - name: type
        path: csi_rs_type[1:0]
        radix: dec
      - name: period
        path: csi_rs_period[5:0]
        radix: dec

  # ---- Uplink channels ----

  PUSCH:
    color: green
    signals:
      - name: en
        path: pusch_ul_en
        radix: bin
      - name: vld
        path: pusch_ul_vld
        radix: bin
      - name: data
        path: pusch_ul_data[127:0]
        radix: hex
        height: 30
      - name: mcs
        path: pusch_ul_mcs[4:0]
        radix: dec
      - name: rb_start
        path: pusch_ul_rb_start[6:0]
        radix: dec
      - name: rb_num
        path: pusch_ul_rb_num[6:0]
        radix: dec
      - name: grant
        path: pusch_ul_grant
        radix: bin
      - name: beta_offset
        path: pusch_ul_beta[4:0]
        radix: dec

  PUCCH:
    color: orange
    signals:
      - name: en
        path: pucch_ul_en
        radix: bin
      - name: vld
        path: pucch_ul_vld
        radix: bin
      - name: format
        path: pucch_ul_format[2:0]
        radix: dec
      - name: sr
        path: pucch_ul_sr
        radix: bin
      - name: ack
        path: pucch_ul_ack[1:0]
        radix: bin
      - name: csi
        path: pucch_ul_csi[4:0]
        radix: hex

  PRACH:
    color: red
    signals:
      - name: en
        path: prach_ul_en
        radix: bin
      - name: vld
        path: prach_ul_vld
        radix: bin
      - name: preamble
        path: prach_ul_preamble[5:0]
        radix: dec
      - name: ta
        path: prach_ul_ta[11:0]
        radix: dec
      - name: root_seq
        path: prach_ul_root_seq[9:0]
        radix: dec
      - name: format
        path: prach_ul_format[2:0]
        radix: dec

  SRS:
    color: lightblue
    signals:
      - name: en
        path: srs_ul_en
        radix: bin
      - name: vld
        path: srs_ul_vld
        radix: bin
      - name: bw
        path: srs_ul_bw[2:0]
        radix: dec
      - name: periodicity
        path: srs_ul_periodicity[4:0]
        radix: dec
      - name: offset
        path: srs_ul_offset[4:0]
        radix: dec

# ---------------------------------------------------------------------------
# SFR (Special Function Register) definitions
# ---------------------------------------------------------------------------
sfr:
  base_path: "tb.dut.sfr"

  registers:

    CHAN_CTRL:
      path: "chan_ctrl[31:0]"
      fields:
        DL_EN:    "[0]"
        UL_EN:    "[1]"
        SSB_EN:   "[2]"
        PRACH_EN: "[3]"
        SRS_EN:   "[4]"
        CSI_EN:   "[5]"
        SOFT_RST: "[30]"
        HARD_RST: "[31]"

    PDSCH_CFG:
      path: "pdsch_cfg[31:0]"
      fields:
        EN:       "[0]"
        MCS:      "[5:1]"
        RB_NUM:   "[11:6]"
        RB_START: "[18:12]"
        MIMO:     "[21:19]"
        HARQ_EN:  "[22]"
        NDI:      "[23]"
        RV:       "[25:24]"

    PUSCH_CFG:
      path: "pusch_cfg[31:0]"
      fields:
        EN:       "[0]"
        MCS:      "[5:1]"
        RB_NUM:   "[11:6]"
        RB_START: "[18:12]"
        BETA:     "[23:19]"
        DMRS_EN:  "[24]"

    PDCCH_CFG:
      path: "pdcch_cfg[31:0]"
      fields:
        EN:       "[0]"
        AL:       "[3:1]"
        FORMAT:   "[7:4]"
        RNTI_TYPE:"[9:8]"
        CCE_IDX:  "[16:10]"

    TIMING_CFG:
      path: "timing_cfg[31:0]"
      fields:
        TA:        "[11:0]"
        N_TA_OFF:  "[15:12]"
        TS_DELTA:  "[23:16]"
        ADVANCE:   "[27:24]"

    SSB_CFG:
      path: "ssb_cfg[31:0]"
      fields:
        EN:          "[0]"
        PERIODICITY: "[3:1]"
        OFFSET:      "[9:4]"
        BEAM_NUM:    "[15:10]"

    PRACH_CFG:
      path: "prach_cfg[31:0]"
      fields:
        EN:          "[0]"
        FORMAT:      "[3:1]"
        ROOT_SEQ:    "[13:4]"
        ZC_IDX:      "[19:14]"
        PREAMBLE_NUM:"[25:20]"

    SRS_CFG:
      path: "srs_cfg[31:0]"
      fields:
        EN:          "[0]"
        BW:          "[3:1]"
        PERIODICITY: "[8:4]"
        OFFSET:      "[13:9]"
        NROF_PORTS:  "[15:14]"

# ---------------------------------------------------------------------------
# Scenario-specific parameters
# ---------------------------------------------------------------------------
scenarios:

  sfr_check:
    # Maximum allowed latency from SFR write to channel response (in cycles)
    max_latency_cycles: 16
    # Which SFR registers to watch for changes
    watch_sfr:
      - CHAN_CTRL
      - PDSCH_CFG
      - PUSCH_CFG
      - PDCCH_CFG
      - TIMING_CFG

  timing:
    reference_channel: "PDSCH"
    compare_channels:
      - "PUSCH"
      - "PDCCH"
      - "SSB"
    time_unit: "ns"

  compare:
    # "multi-instance": compare multiple DUT instances (same FSDB)
    # "multi-fsdb":     compare sim.fsdb vs ref.fsdb
    mode: "multi-instance"
    instances:
      - "cc0"
      - "cc1"
    signals_to_compare:
      - "pdsch_dl_data[127:0]"
      - "pdsch_dl_vld"
      - "pdcch_dl_dci[39:0]"

  edge_count:
    channels:
      - PDSCH
      - PUSCH
      - PDCCH
      - PUCCH
      - SSB
      - PRACH
    signal_key: "vld"
    edge_type:  "rising"

  frame_sync:
    standard:       "NR"       # "LTE" or "NR"
    lte_frame_ns:   10000000   # 10 ms
    nr_subframe_ns:   500000   # 0.5 ms (numerology μ=1)
    nr_slot_ns:       125000   # 0.125 ms (numerology μ=3 / 120 kHz SCS)
    num_frames:       4        # Number of frames to generate markers for
